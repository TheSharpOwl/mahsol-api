version: "3.9"

services:
  db:
    image: mysql:8.0
    container_name: farming_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: farming_db
      MYSQL_USER: farmer
      MYSQL_PASSWORD: farmerpass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "farmer", "-pfarmerpass"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: farming_api
    restart: always
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=mysql+asyncmy://farmer:farmerpass@db:3306/farming_db
      - DATABASE_URL_SYNC=mysql+pymysql://farmer:farmerpass@db:3306/farming_db
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
      - OPENWEATHER_API_KEY=${OPENWEATHER_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - DEBUG=${DEBUG:-false}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  mysql_data:
