<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Mahsol Chat</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <style>
        :root {
            --bg: #0b0f1a;
            --surface: #131927;
            --surface2: #1a2236;
            --border: #1e2a40;
            --primary: #22c55e;
            --primary-dim: #166534;
            --text: #e8ecf4;
            --text-muted: #7a8ba8;
            --bubble-user: #1b3a26;
            --bubble-ai: #1a2236;
            --danger: #ef4444;
            --radius: 20px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100dvh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* ── Phone frame ── */
        .phone {
            width: 100%;
            max-width: 420px;
            height: 100dvh;
            max-height: 820px;
            background: var(--bg);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }
        @media (min-width: 500px) {
            .phone { border-radius: 32px; border: 2px solid var(--border); height: 90vh; }
        }

        /* ── Setup overlay ── */
        .setup-overlay {
            position: absolute; inset: 0; z-index: 10;
            background: var(--bg);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 32px;
            gap: 20px;
            transition: opacity 0.3s, visibility 0.3s;
        }
        .setup-overlay.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
        .setup-overlay .logo { font-size: 48px; }
        .setup-overlay h2 { font-size: 20px; font-weight: 700; color: var(--primary); }
        .setup-overlay p { font-size: 13px; color: var(--text-muted); text-align: center; line-height: 1.5; }
        .setup-overlay input {
            width: 100%; padding: 14px 16px; border-radius: 14px;
            background: var(--surface); border: 1px solid var(--border);
            color: var(--text); font-size: 14px; font-family: inherit;
        }
        .setup-overlay input:focus { outline: none; border-color: var(--primary); }
        .setup-overlay input::placeholder { color: var(--text-muted); }
        .setup-btn {
            width: 100%; padding: 14px; border: none; border-radius: 14px;
            background: var(--primary); color: #000; font-size: 15px;
            font-weight: 600; cursor: pointer; font-family: inherit;
            transition: transform 0.1s;
        }
        .setup-btn:active { transform: scale(0.97); }

        /* ── Header ── */
        .header {
            padding: 16px 20px; display: flex; align-items: center; gap: 14px;
            border-bottom: 1px solid var(--border); background: var(--surface);
            flex-shrink: 0;
        }
        .header .avatar {
            width: 40px; height: 40px; border-radius: 50%;
            background: var(--primary-dim); display: flex; align-items: center;
            justify-content: center; font-size: 20px; flex-shrink: 0;
        }
        .header .info { flex: 1; }
        .header .name { font-weight: 600; font-size: 15px; }
        .header .status-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; }
        .header .status-dot.online { background: var(--primary); }
        .header .status-dot.offline { background: var(--danger); }
        .header .status-text { font-size: 12px; color: var(--text-muted); }
        .header .close-btn {
            width: 36px; height: 36px; border-radius: 50%; border: none;
            background: var(--surface2); color: var(--text-muted); font-size: 18px;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
        }

        /* ── Messages ── */
        .messages {
            flex: 1; overflow-y: auto; padding: 16px 16px 8px;
            display: flex; flex-direction: column; gap: 6px;
            scroll-behavior: smooth;
        }
        .messages::-webkit-scrollbar { width: 4px; }
        .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

        .msg-row { display: flex; flex-direction: column; max-width: 82%; animation: fadeUp 0.25s ease; }
        .msg-row.user { align-self: flex-end; align-items: flex-end; }
        .msg-row.ai { align-self: flex-start; align-items: flex-start; }

        .bubble {
            padding: 12px 16px; font-size: 14px; line-height: 1.55;
            word-wrap: break-word; white-space: pre-wrap;
        }
        .msg-row.user .bubble {
            background: var(--bubble-user); border-radius: var(--radius) var(--radius) 6px var(--radius);
            border: 1px solid #22c55e22;
        }
        .msg-row.ai .bubble {
            background: var(--bubble-ai); border-radius: var(--radius) var(--radius) var(--radius) 6px;
            border: 1px solid var(--border);
        }
        .bubble img {
            max-width: 100%; border-radius: 12px; display: block; margin-top: 4px;
        }
        .msg-time { font-size: 11px; color: var(--text-muted); margin-top: 4px; padding: 0 4px; }

        .system-msg {
            align-self: center; font-size: 12px; color: var(--text-muted);
            background: var(--surface); padding: 6px 16px; border-radius: 20px;
            animation: fadeUp 0.25s ease;
        }

        /* typing */
        .typing-row { align-self: flex-start; animation: fadeUp 0.2s ease; }
        .typing-dots { display: flex; gap: 5px; padding: 14px 18px; background: var(--bubble-ai); border-radius: var(--radius) var(--radius) var(--radius) 6px; border: 1px solid var(--border); }
        .typing-dots span {
            width: 8px; height: 8px; border-radius: 50%; background: var(--text-muted);
            animation: bounce 1.4s infinite;
        }
        .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
        .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes bounce {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
            30% { transform: translateY(-6px); opacity: 1; }
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ── Image preview ── */
        .image-preview {
            display: none; padding: 8px 16px; background: var(--surface);
            border-top: 1px solid var(--border); align-items: center; gap: 10px;
        }
        .image-preview.active { display: flex; }
        .image-preview img { height: 56px; border-radius: 10px; object-fit: cover; }
        .image-preview .remove-img {
            margin-left: auto; width: 28px; height: 28px; border-radius: 50%;
            border: none; background: var(--danger); color: #fff; font-size: 14px;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
        }

        /* ── Input bar ── */
        .input-bar {
            padding: 10px 12px 14px; display: flex; align-items: flex-end; gap: 8px;
            border-top: 1px solid var(--border); background: var(--surface); flex-shrink: 0;
        }
        .input-bar .attach-btn {
            width: 42px; height: 42px; border-radius: 50%; border: none;
            background: var(--surface2); color: var(--text-muted); font-size: 20px;
            cursor: pointer; flex-shrink: 0; display: flex; align-items: center; justify-content: center;
            transition: color 0.15s;
        }
        .input-bar .attach-btn:hover { color: var(--primary); }
        .input-bar textarea {
            flex: 1; padding: 10px 16px; border-radius: 22px;
            background: var(--surface2); border: 1px solid var(--border);
            color: var(--text); font-size: 14px; font-family: inherit;
            resize: none; min-height: 42px; max-height: 120px; line-height: 1.4;
        }
        .input-bar textarea:focus { outline: none; border-color: var(--primary); }
        .input-bar textarea::placeholder { color: var(--text-muted); }
        .input-bar .send-btn {
            width: 42px; height: 42px; border-radius: 50%; border: none;
            background: var(--primary); color: #000; font-size: 18px;
            cursor: pointer; flex-shrink: 0; display: flex; align-items: center; justify-content: center;
            transition: transform 0.1s, opacity 0.15s;
        }
        .input-bar .send-btn:active { transform: scale(0.9); }
        .input-bar .send-btn:disabled { opacity: 0.3; cursor: not-allowed; }

        #fileInput { display: none; }
    </style>
</head>
<body>

<div class="phone">
    <!-- Setup screen -->
    <div class="setup-overlay" id="setup">
        <div class="logo">🌾</div>
        <h2>Mahsol Assistant</h2>
        <p>Paste your JWT token below to connect.<br/>The WebSocket will auto-create a new conversation.</p>
        <input id="tokenInput" placeholder="Paste JWT token here..." />
        <input id="serverInput" value="ws://localhost:8000" placeholder="Server URL" />
        <button class="setup-btn" onclick="startChat()">Start Chat</button>
    </div>

    <!-- Header -->
    <div class="header" id="chatHeader" style="display:none">
        <div class="avatar">🌱</div>
        <div class="info">
            <div class="name">Mahsol AI</div>
            <div>
                <span class="status-dot offline" id="statusDot"></span>
                <span class="status-text" id="statusLabel">Connecting...</span>
            </div>
        </div>
        <button class="close-btn" onclick="disconnect()" title="Disconnect">✕</button>
    </div>

    <!-- Messages -->
    <div class="messages" id="messages" style="display:none"></div>

    <!-- Image preview -->
    <div class="image-preview" id="imgPreview">
        <img id="previewImg" src="" />
        <span style="font-size:13px;color:var(--text-muted)">Image attached</span>
        <button class="remove-img" onclick="clearImage()">✕</button>
    </div>

    <!-- Input -->
    <div class="input-bar" id="inputBar" style="display:none">
        <button class="attach-btn" onclick="document.getElementById('fileInput').click()" title="Attach image">📷</button>
        <input type="file" id="fileInput" accept="image/*" onchange="previewImage(event)" />
        <textarea id="msgInput" rows="1" placeholder="Type a message..." oninput="autoResize(this)"></textarea>
        <button class="send-btn" id="sendBtn" onclick="sendMessage()" disabled>➤</button>
    </div>
</div>

<script>
let ws = null;
let convId = null;
let pendingImage = null;  // base64
let token = '';
let serverUrl = '';

function startChat() {
    token = document.getElementById('tokenInput').value.trim();
    serverUrl = document.getElementById('serverInput').value.trim().replace(/\/+$/, '');
    if (!token) { alert('Paste a JWT token first'); return; }

    document.getElementById('setup').classList.add('hidden');
    document.getElementById('chatHeader').style.display = '';
    document.getElementById('messages').style.display = '';
    document.getElementById('inputBar').style.display = '';

    connectWS();
}

function connectWS() {
    const url = `${serverUrl}/ws/chat/new?token=${token}`;
    setStatus('connecting');
    ws = new WebSocket(url);

    ws.onopen = () => {};

    ws.onmessage = (e) => {
        const msg = JSON.parse(e.data);

        if (msg.type === 'connected') {
            convId = msg.conversation_id;
            setStatus('online');
            addSystem('Connected — new conversation started');
        } else if (msg.type === 'typing') {
            showTyping(msg.data.is_typing);
        } else if (msg.type === 'message') {
            const d = msg.data;
            addBubble(d.sender_type, d.content, d.message_type, d.created_at);
        } else if (msg.error) {
            addSystem('⚠ ' + msg.error);
        }
    };

    ws.onclose = (e) => {
        setStatus('offline');
        addSystem(`Disconnected (code ${e.code})`);
    };

    ws.onerror = () => {
        setStatus('offline');
        addSystem('⚠ Connection error');
    };
}

function disconnect() {
    if (ws) ws.close();
}

function reconnect(existingConvId) {
    if (ws) ws.close();
    const cid = existingConvId || convId || 'new';
    const url = `${serverUrl}/ws/chat/${cid}?token=${token}`;
    setStatus('connecting');
    ws = new WebSocket(url);
    ws.onopen = () => {};
    ws.onmessage = arguments.callee.caller; // reuse handler — just re-call connectWS logic
}

/* ── Send ── */
function sendMessage() {
    const input = document.getElementById('msgInput');
    const text = input.value.trim();

    if (pendingImage) {
        // Send image content (base64)
        const payload = { content: pendingImage, message_type: 'image' };
        ws.send(JSON.stringify(payload));
        clearImage();
        input.value = '';
        updateSendBtn();
        return;
    }

    if (!text) return;
    const payload = { content: text, message_type: 'text' };
    ws.send(JSON.stringify(payload));
    input.value = '';
    input.style.height = '42px';
    updateSendBtn();
}

/* ── Image handling ── */
function previewImage(e) {
    const file = e.target.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = (ev) => {
        pendingImage = ev.target.result;  // base64 data URL
        document.getElementById('previewImg').src = pendingImage;
        document.getElementById('imgPreview').classList.add('active');
        updateSendBtn();
    };
    reader.readAsDataURL(file);
    e.target.value = '';
}

function clearImage() {
    pendingImage = null;
    document.getElementById('imgPreview').classList.remove('active');
    updateSendBtn();
}

/* ── UI helpers ── */
function addBubble(sender, content, msgType, timestamp) {
    removeTyping();
    const row = document.createElement('div');
    row.className = `msg-row ${sender === 'user' ? 'user' : 'ai'}`;

    const bubble = document.createElement('div');
    bubble.className = 'bubble';

    if (msgType === 'image' && content.startsWith('data:image')) {
        const img = document.createElement('img');
        img.src = content;
        img.alt = 'Uploaded image';
        bubble.appendChild(img);
    } else {
        bubble.textContent = content;
    }

    const time = document.createElement('div');
    time.className = 'msg-time';
    time.textContent = timestamp ? new Date(timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) : now();

    row.appendChild(bubble);
    row.appendChild(time);
    document.getElementById('messages').appendChild(row);
    scrollBottom();
}

function addSystem(text) {
    const div = document.createElement('div');
    div.className = 'system-msg';
    div.textContent = text;
    document.getElementById('messages').appendChild(div);
    scrollBottom();
}

function showTyping(show) {
    removeTyping();
    if (!show) return;
    const row = document.createElement('div');
    row.className = 'typing-row';
    row.id = 'typingIndicator';
    row.innerHTML = '<div class="typing-dots"><span></span><span></span><span></span></div>';
    document.getElementById('messages').appendChild(row);
    scrollBottom();
}

function removeTyping() {
    const el = document.getElementById('typingIndicator');
    if (el) el.remove();
}

function setStatus(state) {
    const dot = document.getElementById('statusDot');
    const label = document.getElementById('statusLabel');
    if (state === 'online') {
        dot.className = 'status-dot online';
        label.textContent = 'Online';
        document.getElementById('sendBtn').disabled = false;
    } else if (state === 'connecting') {
        dot.className = 'status-dot offline';
        label.textContent = 'Connecting...';
        document.getElementById('sendBtn').disabled = true;
    } else {
        dot.className = 'status-dot offline';
        label.textContent = 'Offline';
        document.getElementById('sendBtn').disabled = true;
    }
}

function updateSendBtn() {
    const text = document.getElementById('msgInput').value.trim();
    const canSend = ws && ws.readyState === WebSocket.OPEN && (text.length > 0 || pendingImage);
    document.getElementById('sendBtn').disabled = !canSend;
}

function autoResize(el) {
    el.style.height = '42px';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
    updateSendBtn();
}

function scrollBottom() {
    const m = document.getElementById('messages');
    requestAnimationFrame(() => { m.scrollTop = m.scrollHeight; });
}

function now() {
    return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}

/* Enter to send */
document.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
        const active = document.activeElement;
        if (active && active.id === 'msgInput') {
            e.preventDefault();
            sendMessage();
        }
    }
});

/* keep send button in sync */
document.getElementById('msgInput')?.addEventListener('input', updateSendBtn);
</script>
</body>
</html>
