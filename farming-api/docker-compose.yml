version: "3.9"

services:
  db:
    image: mysql:8.0
    container_name: farming_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: farming_db
      MYSQL_USER: farmer
      MYSQL_PASSWORD: farmerpass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "farmer", "-pfarmerpass"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: farming_redis
    restart: always
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build: .
    container_name: farming_api
    restart: always
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=mysql+asyncmy://farmer:farmerpass@db:3306/farming_db
      - DATABASE_URL_SYNC=mysql+pymysql://farmer:farmerpass@db:3306/farming_db
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
      - OPENWEATHER_API_KEY=${OPENWEATHER_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - DEBUG=${DEBUG:-false}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  celery_worker:
    build: .
    container_name: farming_celery_worker
    restart: always
    environment:
      - DATABASE_URL=mysql+asyncmy://farmer:farmerpass@db:3306/farming_db
      - DATABASE_URL_SYNC=mysql+pymysql://farmer:farmerpass@db:3306/farming_db
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
      - OPENWEATHER_API_KEY=${OPENWEATHER_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app
    command: celery -A app.workers.celery.celery_app worker --loglevel=info --concurrency=2

  celery_beat:
    build: .
    container_name: farming_celery_beat
    restart: always
    environment:
      - DATABASE_URL=mysql+asyncmy://farmer:farmerpass@db:3306/farming_db
      - DATABASE_URL_SYNC=mysql+pymysql://farmer:farmerpass@db:3306/farming_db
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
      - OPENWEATHER_API_KEY=${OPENWEATHER_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app
    command: celery -A app.workers.celery.celery_app beat --loglevel=info

  flower:
    build: .
    container_name: farming_flower
    restart: always
    ports:
      - "5555:5555"
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
    depends_on:
      - redis
      - celery_worker
    command: celery -A app.workers.celery.celery_app flower --port=5555

volumes:
  mysql_data:
